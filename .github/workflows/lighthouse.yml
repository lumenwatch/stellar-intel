name: Lighthouse CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

# Applied to every step — `next build` and `next start` both validate these
# via lib/env.ts, so the server must have them at runtime too, not just at build.
env:
  NEXT_PUBLIC_STELLAR_NETWORK: mainnet
  NEXT_PUBLIC_HORIZON_URL: https://horizon.stellar.org
  NEXT_PUBLIC_STELLAR_EXPERT_URL: https://api.stellar.expert/explorer/public
  NEXT_PUBLIC_USDC_ISSUER: GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN
  NEXT_PUBLIC_APP_NAME: Stellar Intel

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: mainnet
          NEXT_PUBLIC_HORIZON_URL: https://horizon.stellar.org
          NEXT_PUBLIC_STELLAR_EXPERT_URL: https://api.stellar.expert/explorer/public
          NEXT_PUBLIC_USDC_ISSUER: GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN
          NEXT_PUBLIC_APP_NAME: Stellar Intel

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        id: lhci
        run: |
          npm start &
          SERVER_PID=$!
          # Wait for the server to accept connections before collecting, so
          # Chrome doesn't hit an interstitial on a not-yet-ready server.
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 >/dev/null && break
            sleep 2
          done

          lhci collect \
            --url=http://localhost:3000 \
            --url=http://localhost:3000/offramp \
            --url=http://localhost:3000/anchors \
            --numberOfRuns=1 \
            --settings.chromeFlags="--no-sandbox --headless=new --disable-gpu --disable-dev-shm-usage"

          kill $SERVER_PID || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Parse and post Lighthouse scores
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // lhci collect writes LHRs to .lighthouseci/lhr-*.json by default.
            const resultsDir = '.lighthouseci';
            const files = fs.existsSync(resultsDir)
              ? fs.readdirSync(resultsDir).filter((f) => f.startsWith('lhr') && f.endsWith('.json'))
              : [];

            if (!files.length) {
              console.log('No Lighthouse result files found.');
              return;
            }

            const formatScore = (score) => {
              const pct = Math.round((score ?? 0) * 100);
              const emoji = pct >= 90 ? '🟢' : pct >= 50 ? '🟡' : '🔴';
              return `${emoji} ${pct}`;
            };

            let rows = '';
            for (const file of files) {
              const report = JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8'));
              const cats = report.categories;
              const reportUrl =
                report.finalDisplayedUrl || report.finalUrl || report.requestedUrl || '/';
              let url = '/';
              try {
                url = new URL(reportUrl).pathname || '/';
              } catch {
                url = reportUrl;
              }
              rows += `| \`${url}\` | ${formatScore(cats.performance?.score)} | ${formatScore(cats.accessibility?.score)} | ${formatScore(cats['best-practices']?.score)} | ${formatScore(cats.seo?.score)} |\n`;
            }

            const body = [
              '## Lighthouse CI Results',
              '',
              '| Page | Performance | Accessibility | Best Practices | SEO |',
              '|------|-------------|---------------|----------------|-----|',
              rows,
              '',
              '> Scores: 🟢 ≥ 90 &nbsp; 🟡 50–89 &nbsp; 🔴 < 50',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
